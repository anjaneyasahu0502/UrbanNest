# fly.toml — deploy backend to Fly.io
# Run: fly launch --no-deploy  (from backend/ directory)
app = "urbannest-backend"
primary_region = "sin"         # Singapore – closest to India

[build]
  # Uses Node.js buildpack automatically

[http_service]
  internal_port = 8080
  force_https   = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[env]
  NODE_ENV = "production"
  PORT     = "8080"
  XAI_MODEL = "grok-beta"
  EMAIL_HOST = "smtp.gmail.com"
  EMAIL_PORT = "587"
  # Secrets (set via: fly secrets set KEY=value)
  # MONGO_URL SESSION_SECRET FRONTEND_ORIGIN XAI_API_KEY
  # EMAIL_USER EMAIL_PASSWORD STRIPE_SECRET CLOUDINARY_CLOUD_NAME
  # CLOUDINARY_KEY CLOUDINARY_SECRET PEXELS_API_KEY
